apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mnemonicai
  namespace: mnemonicai
  labels:
    app: mnemonicai
    release: prometheus
spec:
  selector:
    matchLabels:
      app: mnemonicai
  namespaceSelector:
    matchNames:
      - mnemonicai
  endpoints:
    - port: api
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
