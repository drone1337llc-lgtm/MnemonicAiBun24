apiVersion: v1
kind: Service
metadata:
  name: mnemonicai
  namespace: mnemonicai
  labels:
    app: mnemonicai
spec:
  type: ClusterIP
  selector:
    app: mnemonicai
  ports:
    - name: api
      port: 8400
      targetPort: 8400
      protocol: TCP
    - name: adapter-ui
      port: 8401
      targetPort: 8401
      protocol: TCP
    - name: metrics
      port: 8402
      targetPort: 8402
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mnemonicai-external
  namespace: mnemonicai
  labels:
    app: mnemonicai
spec:
  type: LoadBalancer
  selector:
    app: mnemonicai
  ports:
    - name: api
      port: 80
      targetPort: 8400
      protocol: TCP
