# docker-compose.yml — MnemonicAi stack
# Usage:
#   docker compose up --build
#   docker compose -f docker-compose.yml exec mnemonicai ./mn_run.sh status
services:
  mnemonicai:
    build:
      context: .
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      # Pin to the RTX 3090 (24GB). The model does not fit on the 16GB 4080
      # SUPER: peft upcasts the unquantized ~1B-element embed/lm_head to fp32
      # (~3.8GiB each) on top of the 4-bit base, needing ~15.6GB total.
      - NVIDIA_VISIBLE_DEVICES=1
      - MN_REPO=/app
      - MN_HOST=0.0.0.0
      - MN_PORT=8400
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - ./mnemonicai_data:/app/mnemonicai_data
      - ./models:/app/models
      - ./config.json:/app/config.json:ro
      - ./.mn_gpu_roles:/app/.mn_gpu_roles:ro
    ports:
      - "8400:8400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    healthcheck:
      # Healthy = API up AND the real model loaded. The server falls back to a
      # MockBackend when the model fails to load; that must count as unhealthy
      # or the container serves canned responses and learns nothing.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8400/health | grep -v '\"backend\": *\"mock\"'"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  adapter-ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "app/adapter_ui.py"]
    environment:
      - MN_REPO=/app
    volumes:
      - ./mnemonicai_data:/app/mnemonicai_data
    ports:
      - "8401:8401"
    depends_on:
      - mnemonicai
    restart: unless-stopped
